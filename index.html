<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>求职申请管理看板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__copy">
          <p class="eyebrow">Campus Job Tracker</p>
          <h1>求职申请管理看板</h1>
          <p class="hero__description">
            用一个看板，把截止日期、材料状态、面试进度和下一步行动串起来。
          </p>
          <div class="hero__actions">
            <button id="focus-urgent" class="btn btn--primary">查看紧急岗位</button>
            <button id="open-add" class="btn btn--ghost">新增申请</button>
          </div>
        </div>
        <section class="hero__panel">
          <div class="hero__panel-top">
            <span>本周求职节奏</span>
            <strong id="health-score">78</strong>
          </div>
          <p id="health-summary" class="hero__panel-copy"></p>
          <div id="today-reminders" class="reminder-list"></div>
        </section>
      </header>

      <main class="dashboard">
        <section class="stats-grid" id="stats-grid"></section>

        <section class="action-grid">
          <article class="card action-card">
            <div class="section-heading section-heading--compact">
              <div>
                <p class="section-heading__eyebrow">Action Center</p>
                <h2>今日优先处理</h2>
              </div>
            </div>
            <div id="priority-queue" class="action-list"></div>
          </article>

          <article class="card action-card">
            <div class="section-heading section-heading--compact">
              <div>
                <p class="section-heading__eyebrow">Follow Up</p>
                <h2>待跟进列表</h2>
              </div>
            </div>
            <div id="followup-queue" class="action-list"></div>
          </article>

          <article class="card action-card">
            <div class="section-heading section-heading--compact">
              <div>
                <p class="section-heading__eyebrow">Materials Hub</p>
                <h2>材料与版本</h2>
              </div>
            </div>
            <div id="materials-hub" class="action-list"></div>
          </article>
        </section>

        <section class="toolbar">
          <div class="toolbar__group toolbar__search">
            <label for="search-input">搜索岗位</label>
            <input
              id="search-input"
              type="search"
              placeholder="搜索公司、岗位、城市"
            />
          </div>
          <div class="toolbar__group">
            <label for="type-filter">类型</label>
            <select id="type-filter">
              <option value="all">全部</option>
              <option value="校招">校招</option>
              <option value="实习">实习</option>
            </select>
          </div>
          <div class="toolbar__group">
            <label for="priority-filter">优先级</label>
            <select id="priority-filter">
              <option value="all">全部</option>
              <option value="high">高优先级</option>
              <option value="medium">中优先级</option>
              <option value="low">低优先级</option>
            </select>
          </div>
          <div class="toolbar__group">
            <label for="material-filter">材料</label>
            <select id="material-filter">
              <option value="all">全部</option>
              <option value="missing">有缺失</option>
              <option value="complete">已齐全</option>
            </select>
          </div>
          <div class="toolbar__group">
            <label for="stage-filter">阶段</label>
            <select id="stage-filter">
              <option value="all">全部</option>
              <option value="wishlist">待申请</option>
              <option value="applied">已投递</option>
              <option value="written-test">笔试中</option>
              <option value="interview">面试中</option>
              <option value="offer">Offer</option>
              <option value="closed">已结束</option>
            </select>
          </div>
        </section>

        <section class="content-grid">
          <section class="board-panel">
            <div class="section-heading">
              <div>
                <p class="section-heading__eyebrow">Flow Board</p>
                <h2>申请进度总览</h2>
              </div>
              <p class="section-heading__note">支持拖拽流转，详情内可继续查看 JD、简历版本与跟进动作</p>
            </div>
            <div id="kanban-board" class="kanban-board"></div>
          </section>

          <aside class="side-panel">
            <section class="card">
              <div class="section-heading section-heading--compact">
                <div>
                  <p class="section-heading__eyebrow">Calendar</p>
                  <h2>近期时间线</h2>
                </div>
              </div>
              <div id="timeline" class="timeline"></div>
            </section>

            <section class="card">
              <div class="section-heading section-heading--compact">
                <div>
                  <p class="section-heading__eyebrow">Details</p>
                  <h2>岗位详情</h2>
                </div>
              </div>
              <div id="detail-panel" class="detail-panel empty-state">
                点击任意岗位卡片查看详细信息。
              </div>
            </section>
          </aside>
        </section>
      </main>
    </div>

    <dialog id="application-dialog" class="application-dialog">
      <form id="application-form" class="application-form" method="dialog">
        <div class="dialog-heading">
          <div>
            <p class="section-heading__eyebrow">New Item</p>
            <h2>新增申请岗位</h2>
          </div>
          <button id="close-dialog" class="icon-btn" type="button">×</button>
        </div>

        <div class="form-grid">
          <label>
            公司名称
            <input name="company" required />
          </label>
          <label>
            岗位名称
            <input name="role" required />
          </label>
          <label>
            城市
            <input name="city" required />
          </label>
          <label>
            类型
            <select name="type">
              <option value="校招">校招</option>
              <option value="实习">实习</option>
            </select>
          </label>
          <label>
            截止日期
            <input name="deadline" type="date" required />
          </label>
          <label>
            投递渠道
            <input name="channel" placeholder="官网 / 内推 / Boss / LinkedIn" />
          </label>
          <label>
            简历版本
            <input name="resumeVersion" placeholder="如：产品经理-v4" />
          </label>
          <label>
            下次跟进
            <input name="followUpDate" type="date" />
          </label>
          <label>
            当前阶段
            <select name="stage">
              <option value="wishlist">待申请</option>
              <option value="applied">已投递</option>
              <option value="written-test">笔试中</option>
              <option value="interview">面试中</option>
              <option value="offer">Offer</option>
              <option value="closed">已结束</option>
            </select>
          </label>
        </div>

        <label>
          下一步动作
          <input name="nextAction" required />
        </label>

        <label>
          备注
          <textarea name="notes" rows="3"></textarea>
        </label>

        <div class="dialog-actions">
          <button class="btn btn--ghost" type="button" id="cancel-dialog">取消</button>
          <button class="btn btn--primary" type="submit">保存岗位</button>
        </div>
      </form>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
